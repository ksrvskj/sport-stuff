<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f12">
<title>Morning Workout</title>
<link rel="stylesheet" href="style.css">
<style>:root{--accent:#7fa693}</style>
</head>
<body>

<div class="header">
  <div class="header-sub">Morning Routine</div>
  <h1 id="tierTitle">Just Show Up</h1>
  <div class="header-desc" id="tierDesc">~10 min · Tired, low energy, depression day. Just don't skip.</div>
  <div class="header-links">
    <a class="header-link" href="index.html">&larr; Hub</a>
  </div>
</div>

<div class="tiers">
  <button class="tier-btn active-min" data-tier="min" onclick="switchTier('min')">
    <div class="tier-emoji" id="tier-icon-min"></div>
    <div>Just Show Up</div>
    <div class="tier-time">~10 min</div>
  </button>
  <button class="tier-btn" data-tier="regular" onclick="switchTier('regular')">
    <div class="tier-emoji" id="tier-icon-regular"></div>
    <div>Regular</div>
    <div class="tier-time">~22 min</div>
  </button>
  <button class="tier-btn" data-tier="full" onclick="switchTier('full')">
    <div class="tier-emoji" id="tier-icon-full"></div>
    <div>Full Pack</div>
    <div class="tier-time">~38 min</div>
  </button>
</div>

<div class="exercises" id="exerciseList"></div>

<div class="bottom-bar">
  <div>↻ Tap swap to switch exercises · Tap ○ to mark done</div>
</div>

<script src="icons.js"></script>
<script>
const EXERCISES={core:[{id:"dead-bugs",name:"Dead Bugs",sets:"2×8 each side",time:null,cue:"Press lower back into the floor. Extend opposite arm and leg slowly. If your back arches, you've gone too far.",category:"core",svg:"dead-bugs"},{id:"bird-dogs",name:"Bird Dogs",sets:"2×8 each side",time:null,cue:"Tabletop position. Extend opposite arm and leg, keep hips level — imagine a cup of coffee on your lower back.",category:"core",svg:"bird-dogs"},{id:"front-plank",name:"Front Plank",sets:"1×",time:40,cue:"Forearms on the floor, body straight. Squeeze glutes, pull belly button in. Don't let hips sag or pike up.",category:"core",svg:"plank"},{id:"side-plank",name:"Side Plank",sets:"2× (each side)",time:30,cue:"Stack feet or stagger them. Lift hips until body is straight. Top hand on hip or reaching up. Breathe!",category:"core",svg:"side-plank"},{id:"hollow-hold",name:"Hollow Body Hold",sets:"3×",time:20,cue:"Lie flat, press lower back down. Lift shoulders and legs slightly off the ground. Arms by ears or by sides if too hard.",category:"core",svg:"hollow-hold"},{id:"leg-raises",name:"Bent-Knee Leg Raises",sets:"3×10",time:null,cue:"Lie flat, hands under hips for back support. Lift bent knees to chest, lower slowly. Keep lower back pressed down.",category:"core",svg:"leg-raises"},{id:"bear-hold",name:"Bear Crawl Hold",sets:"3×",time:20,cue:"Tabletop position, lift knees 2cm off the ground. Hold. Breathe. Harder than it looks.",category:"core",svg:"bear-hold"},{id:"dead-bug-reach",name:"Dead Bug Reaches",sets:"2×10 each side",time:null,cue:"Like dead bugs but both arms start overhead. Reach opposite arm to opposite knee while extending the other leg.",category:"core",svg:"dead-bugs"}],glutes:[{id:"glute-bridge",name:"Glute Bridges",sets:"2×12",time:null,cue:"Feet flat, hip-width. Drive through heels, squeeze glutes at the top. Pause 1 second up top.",category:"glutes",svg:"glute-bridge"},{id:"sl-glute-bridge",name:"Single Leg Glute Bridge",sets:"2×10 each side",time:null,cue:"One foot planted, other leg extended or knee to chest. Drive through the planted heel. Keep hips level.",category:"glutes",svg:"sl-glute-bridge"},{id:"clamshells",name:"Clamshells",sets:"2×12 each side",time:null,cue:"Side-lying, knees bent 90°. Open top knee like a clamshell, keep feet together. Don't roll your hips back.",category:"glutes",svg:"clamshell"},{id:"fire-hydrants",name:"Fire Hydrants",sets:"2×12 each side",time:null,cue:"Tabletop position. Lift knee out to the side, keeping 90° bend. Control the movement — no swinging.",category:"glutes",svg:"fire-hydrant"},{id:"donkey-kicks",name:"Donkey Kicks",sets:"2×12 each side",time:null,cue:"Tabletop, push one foot toward the ceiling. Keep knee bent 90°. Squeeze at the top, don't arch your back.",category:"glutes",svg:"donkey-kick"},{id:"hip-thrust",name:"Hip Thrusts (Elevated)",sets:"2×12",time:null,cue:"Upper back on bed/couch edge. Feet flat on floor. Drive hips up until thighs are parallel. Squeeze hard at the top.",category:"glutes",svg:"hip-thrust"}],upper:[{id:"push-ups",name:"Push-Ups",sets:"2×8–12",time:null,cue:"Hands under shoulders, core tight. Lower chest to floor, push back up. On knees is fine — full range of motion > half reps.",category:"upper",svg:"push-up"},{id:"pike-push-ups",name:"Pike Push-Ups",sets:"2×8",time:null,cue:"Inverted V position, hands shoulder width. Bend elbows, lower head toward floor. Great for shoulders.",category:"upper",svg:"pike-push-up"},{id:"scap-push-ups",name:"Scapular Push-Ups",sets:"2×10",time:null,cue:"Plank position, arms straight. Let shoulder blades pinch together, then push them apart. Arms stay locked.",category:"upper",svg:"scap-push-up"},{id:"superman",name:"Superman (Gentle)",sets:"2×8",time:null,cue:"Lie face down. Lift arms and legs just a few cm — you don't need a huge range. Hold 2 sec at top. Go easy with your back.",category:"upper",svg:"superman"},{id:"tricep-dips",name:"Tricep Dips (Chair/Bed)",sets:"2×10",time:null,cue:"Hands on edge behind you, legs extended or bent. Lower until elbows hit ~90°, push back up.",category:"upper",svg:"tricep-dip"}],mobility:[{id:"cat-cow",name:"Cat-Cow",sets:"",time:60,cue:"Tabletop. Inhale: drop belly, look up (cow). Exhale: round spine, tuck chin (cat). Slow and fluid.",category:"mobility",svg:"cat-cow"},{id:"hip-flexor",name:"Hip Flexor Stretch",sets:"30s each side",time:30,cue:"Kneeling lunge. Push hips forward gently, feel the stretch in front of the back leg's hip. Don't arch your lower back.",category:"mobility",svg:"hip-flexor"},{id:"90-90",name:"90/90 Hip Stretch",sets:"30s each side",time:30,cue:"Sit with both knees at 90°, front and back. Lean forward over the front leg. Switch sides.",category:"mobility",svg:"ninety-ninety"},{id:"thoracic-rotation",name:"Thoracic Rotation",sets:"8 each side",time:null,cue:"Side-lying, knees stacked and bent. Open top arm to the other side like opening a book. Follow with your eyes.",category:"mobility",svg:"thoracic"},{id:"worlds-greatest",name:"World's Greatest Stretch",sets:"5 each side",time:null,cue:"Deep lunge, plant inside hand, rotate and reach other arm to ceiling. Combines hip, thoracic, and hamstring stretch in one.",category:"mobility",svg:"worlds-greatest"},{id:"pigeon",name:"Pigeon Pose",sets:"45s each side",time:45,cue:"Front shin across the mat, back leg extended. Fold forward gently. Amazing for tight hips from running.",category:"mobility",svg:"pigeon"},{id:"figure-four",name:"Figure-4 Stretch",sets:"30s each side",time:30,cue:"Lie on back, cross one ankle over opposite knee. Pull the bottom leg toward chest. Gentle on the back.",category:"mobility",svg:"figure-four"}]};

const TIERS={min:{name:"Just Show Up",time:"~10 min",desc:"Tired, low energy, depression day. Just don't skip.",color:"#7fa693",exercises:["cat-cow","dead-bugs","glute-bridge","bird-dogs","front-plank","hip-flexor"]},regular:{name:"Regular Morning",time:"~22 min",desc:"Normal day. Solid core + glutes + a bit of everything.",color:"#c9a87e",exercises:["cat-cow","dead-bugs","glute-bridge","bird-dogs","front-plank","side-plank","clamshells","push-ups","hollow-hold","90-90","thoracic-rotation"]},full:{name:"Full Pack (Abroad)",time:"~38 min",desc:"No gym available. Full body, replaces strength day.",color:"#b49ac4",exercises:["cat-cow","dead-bugs","hollow-hold","leg-raises","front-plank","side-plank","glute-bridge","sl-glute-bridge","clamshells","fire-hydrants","push-ups","pike-push-ups","superman","worlds-greatest","pigeon","thoracic-rotation"]}};

const CATEGORY_LABELS={core:"Core",glutes:"Glutes",upper:"Upper Body",mobility:"Mobility"};

const allEx=Object.values(EXERCISES).flat();
const getEx=id=>allEx.find(e=>e.id===id);

let currentTier="min";
let swaps={min:{},regular:{},full:{}};
let timers={};
let doneSet=new Set();

function switchTier(t){
  currentTier=t;
  document.querySelectorAll('.tier-btn').forEach(b=>{
    b.className='tier-btn'+(b.dataset.tier===t?' active-'+t:'');
  });
  const tier=TIERS[t];
  document.getElementById('tierTitle').textContent=tier.name;
  document.getElementById('tierDesc').textContent=tier.time+' · '+tier.desc;
  render();
  updateURL();
}

function getEffective(){
  const s=swaps[currentTier]||{};
  return TIERS[currentTier].exercises.map(id=>{
    const swapped=s[id]||id;
    return getEx(swapped);
  }).filter(Boolean);
}

    "thoracic":`<circle cx="${25*sc}" cy="${32*sc}" r="${5*sc}" ${st}/><line x1="${28*sc}" y1="${36*sc}" x2="${42*sc}" y2="${42*sc}" ${st}/><line x1="${42*sc}" y1="${42*sc}" x2="${52*sc}" y2="${52*sc}" ${st}/><line x1="${52*sc}" y1="${52*sc}" x2="${60*sc}" y2="${52*sc}" ${st}/><line x1="${34*sc}" y1="${38*sc}" x2="${50*sc}" y2="${22*sc}" ${st}/>${floor}`,
    "worlds-greatest":`<circle cx="${28*sc}" cy="${15*sc}" r="${5*sc}" ${st}/><line x1="${28*sc}" y1="${20*sc}" x2="${35*sc}" y2="${38*sc}" ${st}/><line x1="${35*sc}" y1="${38*sc}" x2="${38*sc}" y2="${52*sc}" ${st}/><line x1="${38*sc}" y1="${52*sc}" x2="${42*sc}" y2="${52*sc}" ${st}/><line x1="${35*sc}" y1="${38*sc}" x2="${62*sc}" y2="${52*sc}" ${st}/><line x1="${62*sc}" y1="${52*sc}" x2="${65*sc}" y2="${52*sc}" ${st}/><line x1="${32*sc}" y1="${28*sc}" x2="${32*sc}" y2="${52*sc}" ${st}/><line x1="${32*sc}" y1="${28*sc}" x2="${20*sc}" y2="${10*sc}" ${st}/>${floor}`,
    "pigeon":`<circle cx="${22*sc}" cy="${30*sc}" r="${5*sc}" ${st}/><line x1="${25*sc}" y1="${34*sc}" x2="${40*sc}" y2="${48*sc}" ${st}/><line x1="${40*sc}" y1="${48*sc}" x2="${28*sc}" y2="${52*sc}" ${st}/><line x1="${40*sc}" y1="${48*sc}" x2="${70*sc}" y2="${50*sc}" ${st}/><line x1="${70*sc}" y1="${50*sc}" x2="${74*sc}" y2="${46*sc}" ${st}/>${floor}`,
    "figure-four":`<circle cx="${15*sc}" cy="${40*sc}" r="${5*sc}" ${st}/><line x1="${20*sc}" y1="${42*sc}" x2="${42*sc}" y2="${42*sc}" ${st}/><line x1="${42*sc}" y1="${42*sc}" x2="${48*sc}" y2="${28*sc}" ${st}/><line x1="${48*sc}" y1="${28*sc}" x2="${42*sc}" y2="${22*sc}" ${st}/><line x1="${42*sc}" y1="${42*sc}" x2="${50*sc}" y2="${34*sc}" ${st}/><line x1="${50*sc}" y1="${34*sc}" x2="${58*sc}" y2="${34*sc}" ${st}/><line x1="${30*sc}" y1="${42*sc}" x2="${38*sc}" y2="${25*sc}" ${st}/><line x1="${10*sc}" y1="${48*sc}" x2="${78*sc}" y2="${48*sc}" ${fl}/>`
  };
  return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}">${svgs[type]||svgs["plank"]}</svg>`;
}

function startTimer(exId,seconds){
  const key=currentTier+'-'+exId;
  if(timers[key]&&timers[key].interval){
    clearInterval(timers[key].interval);
    timers[key].running=false;
    updateTimerDisplay(key);
    return;
  }
  if(!timers[key])timers[key]={left:seconds,total:seconds,running:false,interval:null};
  if(timers[key].left<=0){
    timers[key].left=seconds;
    timers[key].running=false;
    updateTimerDisplay(key);
    return;
  }
  timers[key].running=true;
  timers[key].interval=setInterval(()=>{
    timers[key].left--;
    if(timers[key].left<=0){
      clearInterval(timers[key].interval);
      timers[key].interval=null;
      timers[key].running=false;
    }
    updateTimerDisplay(key);
  },1000);
  updateTimerDisplay(key);
}

function updateTimerDisplay(key){
  const el=document.getElementById('timer-'+key);
  if(!el)return;
  const t=timers[key];
  const m=Math.floor(t.left/60);
  const s=t.left%60;
  const pct=((t.total-t.left)/t.total)*100;
  const done=t.left<=0;
  const ring=el.querySelector('.timer-ring');
  const inner=el.querySelector('.timer-inner');
  const hint=el.querySelector('.timer-hint');
  ring.style.background=`conic-gradient(${done?'var(--vegan)':'var(--warm)'} ${pct}%, rgba(255,255,255,0.1) ${pct}%)`;
  inner.style.color=done?'var(--vegan)':'var(--text)';
  inner.textContent=done?'✓':`${m}:${String(s).padStart(2,'0')}`;
  hint.textContent=done?'done — tap to reset':t.running?'tap to pause':'tap to start';
}

function toggleDone(exId){
  const key=currentTier+'-'+exId;
  if(doneSet.has(key))doneSet.delete(key);else doneSet.add(key);
  render();
}

function toggleSwap(exId){
  const panel=document.getElementById('swap-'+currentTier+'-'+exId);
  if(panel)panel.classList.toggle('hidden');
}

function doSwap(origId,newId){
  swaps[currentTier][origId]=newId;
  render();
}

function render(){
  const exercises=getEffective();
  const container=document.getElementById('exerciseList');
  let html='';
  exercises.forEach((ex,i)=>{
    const origId=TIERS[currentTier].exercises[i];
    const key=currentTier+'-'+ex.id;
    const isDone=doneSet.has(key);
    const cat=ex.category;
    const alts=EXERCISES[cat].filter(e=>e.id!==ex.id);
    const timerKey=currentTier+'-'+ex.id;
    if(!timers[timerKey]&&ex.time)timers[timerKey]={left:ex.time,total:ex.time,running:false,interval:null};

    html+=`<div class="ex-card bg-${cat}${isDone?' done':''}">
      <div class="ex-top">
        <div class="ex-svg">${makeSVG(ex.svg)}</div>
        <div class="ex-body">
          <div class="ex-cat cat-${cat}">${CATEGORY_LABELS[cat]}</div>
          <div class="ex-name${isDone?' done':''}">${ex.name}</div>
          <div class="ex-sets sets-${cat}">${ex.sets}${ex.time?' × '+ex.time+'s':''}</div>
          <div class="ex-cue">${ex.cue}</div>
          ${ex.time?`<div class="timer-wrap" id="timer-${timerKey}">
            <div class="timer-ring" onclick="startTimer('${ex.id}',${ex.time})" style="background:conic-gradient(var(--warm) 0%, rgba(255,255,255,0.1) 0%)">
              <div class="timer-inner">${timers[timerKey]?formatTime(timers[timerKey].left):formatTime(ex.time)}</div>
            </div>
            <span class="timer-hint">tap to start</span>
          </div>`:''}
        </div>
        <div class="ex-actions">
          <button class="check-btn${isDone?' checked':''}" onclick="toggleDone('${ex.id}')">${isDone?'✓':''}</button>
          <button class="swap-btn" onclick="toggleSwap('${origId}')">↻</button>
        </div>
      </div>
      <div class="swap-panel hidden" id="swap-${currentTier}-${origId}">
        <div class="swap-label">Swap for:</div>
        <div class="swap-options">
          ${alts.map(a=>`<button class="swap-opt swap-border-${cat}" onclick="doSwap('${origId}','${a.id}')">${a.name}</button>`).join('')}
        </div>
      </div>
    </div>`;
  });
  container.innerHTML=html;

  // restore timer displays
  exercises.forEach(ex=>{
    if(ex.time){
      const tk=currentTier+'-'+ex.id;
      if(timers[tk])updateTimerDisplay(tk);
    }
  });
}

function formatTime(sec){
  const m=Math.floor(sec/60);
  const s=sec%60;
  return `${m}:${String(s).padStart(2,'0')}`;
}

function readURL(){
  const params=new URLSearchParams(location.search);
  if(params.get('t')&&TIERS[params.get('t')]){
    switchTier(params.get('t'));
    return true;
  }
  return false;
}
function updateURL(){
  const params=new URLSearchParams();
  if(currentTier!=='min')params.set('t',currentTier);
  const qs=params.toString();
  history.replaceState(null,'',qs?'?'+qs:location.pathname);
}

document.getElementById('tier-icon-min').innerHTML=ICONS.tier.moon;
document.getElementById('tier-icon-regular').innerHTML=ICONS.tier.sun;
document.getElementById('tier-icon-full').innerHTML=ICONS.tier.lightning;
if(!readURL()) render();
</script>
