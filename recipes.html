function resolve(s,ings,b,tgt){return t(s).replace(/\{(\d+)\}/g,(_,i)=>{const ing=ings[+i];if(!ing)return'?';let a=ing.pp?ing.a:sc(ing.a,b,tgt,t(ing.u));let short=t(ing.u)?`${a} ${t(ing.u)}`:`${a}`;return`<span class="hi">${short}</span>`;});}

function catIcon(cat){return ICONS.cat[cat]||ICONS.cat.soup;}

function toggleNutrition(){hideNutrition=!hideNutrition;localStorage.setItem('hideNutrition',hideNutrition?'1':'0');applyNutrition();}
function applyNutrition(){document.body.classList.toggle('hide-nutrition',hideNutrition);const nt=document.getElementById('nutToggle');nt?.classList.toggle('off',hideNutrition);const nl=document.getElementById('nutLabel');if(nl)nl.textContent=hideNutrition?'×':'ⓘ';}

function fullRender(){
  document.getElementById('hTitle').textContent=t(UI.title);document.getElementById('hDesc').textContent=t(UI.desc);document.getElementById('hCoffee').textContent=t(UI.coffee);document.getElementById('cookBackLabel').textContent=t(UI.back);
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase()===lang));
  applyNutrition();renderBrowse();if(cookId)renderCook();
}

function renderBrowse(){
  // Top-level categories
  document.getElementById('catBar').innerHTML=TOP_CATS.map(c=>{
    const icon=ICONS.cat[c.id]||'';
    return`<button class="fbtn${curTop===c.id?' active':''}" style="--c:${c.color}" onclick="setTop('${c.id}')">${icon}${t(c.label)}</button>`;
  }).join('');

  // Subcategories (only when batch selected)
  const subBar=document.getElementById('subBar');
  if(curTop==='batch'){
    subBar.innerHTML=`<button class="fbtn${curSub===null?' active':''}" style="--c:${getTopColor('batch')}" onclick="setSub(null)">${lang==='ru'?'Всё':'All'}</button>`+SUB_CATS.map(s=>
      `<button class="fbtn${curSub===s.id?' active':''}" style="--c:${getTopColor('batch')}" onclick="setSub('${s.id}')">${ICONS.cat[s.id]||''}${t(s.label)}</button>`
    ).join('');
    subBar.style.display='';
  } else {
    subBar.innerHTML='';
    subBar.style.display='none';
  }

  // Tags
  let tagHtml=TAGS.map(tg=>`<button class="tbtn${activeTags.has(tg.id)?' on':''}" style="--c:${tg.color}" onclick="toggleTag('${tg.id}')">${TAG_ICON[tg.id]||''}${t(tg.label)}</button>`).join('');
  const ingCount=activeIngs.size;
  tagHtml+=`<button class="ing-toggle${ingOpen?' open':''}${ingCount>0?' has-active':''}" onclick="toggleIngPanel()">${ingCount>0?`${t(UI.ingFilterN)} (${ingCount})`:t(UI.ingFilter)}</button>`;
  document.getElementById('tagBar').innerHTML=tagHtml;
  const ingBar=document.getElementById('ingBar');
  ingBar.className='ing-row'+(ingOpen?' open':'');
  ingBar.innerHTML=ING_TAGS.map(ig=>`<button class="ibtn${activeIngs.has(ig.id)?' on':''}" onclick="toggleIng('${ig.id}')">${t(ig.label)}</button>`).join('');

  // Filter recipes
  let items=R.filter(r=>{
    if(curTop==='batch'){
      if(curSub)return r.cat===curSub;
      return BATCH_SUBS.includes(r.cat);
    }
    return r.cat===curTop;
  });
  if(activeTags.size)items=items.filter(r=>[...activeTags].every(tg=>r.tags.includes(tg)));
  if(activeIngs.size)items=items.filter(r=>[...activeIngs].every(ig=>(r.itags||[]).includes(ig)));

  const list=document.getElementById('cardList');
  if(!items.length){list.innerHTML=`<div class="nothing">${t(UI.noMatch)}</div>`;return;}
  list.innerHTML=items.map((r,idx)=>{const c=gc(r.cat),isOpen=openCard===r.id;
    return`<div class="card${isOpen?' open':''}" style="--c:${c}" onclick="toggleCard('${r.id}')"><div class="card-top"><div class="card-icon" style="--c:${c}">${catIcon(r.cat)}</div><div class="card-body"><div class="card-name">${t(r.name)}</div>${r.sub?`<div class="card-sub">${t(r.sub)}</div>`:''}<div class="card-row"><span class="card-meta">${t(r.time)}</span><span class="card-meta">${r.bp} ${UI.pWord(r.bp)}</span><span class="card-protein">${ICONS.tag.protein}${r.kbju[1]}${lang==='ru'?'г':'g'}</span>${r.tags.map(tg=>`<span class="card-tag tag-${tg}">${TAG_ICON[tg]||''}${tg==='vegan'?'V':tg==='gf'?'GF':tg==='fast'?'<15':tg==='hprot'?(lang==='ru'?'Б':'P'):tg==='comfort'?'':tg}</span>`).join('')}</div></div></div>${isOpen?`<div class="card-preview" onclick="event.stopPropagation()"><div class="card-preview-list">${r.ing.map(i=>`${t(i.t)}${t(i.u)?' · '+fmtIng(i,r.bp,r.bp):''}`).join('<br>')}</div><button class="card-cook" style="--c:${c}" onclick="event.stopPropagation();enterCook('${r.id}')">${t(UI.cook)}</button></div>`:''}</div>`;
  }).join('');
}

function setTop(id){curTop=id;curSub=null;openCard=null;renderBrowse();}
function setSub(id){curSub=id;openCard=null;renderBrowse();}
function toggleTag(id){activeTags.has(id)?activeTags.delete(id):activeTags.add(id);openCard=null;renderBrowse();}
function toggleIngPanel(){ingOpen=!ingOpen;renderBrowse();}
function toggleIng(id){activeIngs.has(id)?activeIngs.delete(id):activeIngs.add(id);openCard=null;renderBrowse();}
function toggleCard(id){openCard=openCard===id?null:id;renderBrowse();}

function enterCook(id){cookId=id;stepsDone={};Object.keys(tmrs).forEach(k=>{if(tmrs[k].iv)clearInterval(tmrs[k].iv);});tmrs={};document.body.classList.add('cooking');window.scrollTo(0,0);renderCook();updateURL();}
function exitCook(){Object.keys(tmrs).forEach(k=>{if(tmrs[k].iv)clearInterval(tmrs[k].iv);});tmrs={};document.body.classList.remove('cooking');cookId=null;updateURL();}
function adjP(id,delta){const r=R.find(x=>x.id===id);if(!r)return;const cur=cookPortion[id]||r.bp;cookPortion[id]=Math.min(12,Math.max(1,cur+delta));renderCook();updateURL();}
function setP(id,val){const n=parseInt(val);if(isNaN(n)||n<1)return;cookPortion[id]=Math.min(12,Math.max(1,n));renderCook();updateURL();}
function toggleStep(i,e){e?.stopPropagation();stepsDone[i]=!stepsDone[i];renderCook();}
function startTm(si,secs){const k='t'+si;if(tmrs[k]?.iv){clearInterval(tmrs[k].iv);tmrs[k].iv=null;updateTmRing(k);return;}if(!tmrs[k])tmrs[k]={left:secs,total:secs,iv:null};if(tmrs[k].left<=0){tmrs[k].left=secs;updateTmRing(k);return;}tmrs[k].iv=setInterval(()=>{tmrs[k].left--;if(tmrs[k].left<=0){clearInterval(tmrs[k].iv);tmrs[k].iv=null;}updateTmRing(k);},1000);updateTmRing(k);}
function updateTmRing(key){const el=document.getElementById('timer-'+key);if(!el)return;const tm=tmrs[key];const pct=((tm.total-tm.left)/tm.total)*100;const done=tm.left<=0;const ring=el.querySelector('.timer-ring');const inner=el.querySelector('.timer-inner');const hint=el.querySelector('.timer-hint');ring.style.background=`conic-gradient(${done?'var(--vegan)':'var(--warm)'} ${pct}%, rgba(255,255,255,0.1) ${pct}%)`;inner.style.color=done?'var(--vegan)':'var(--text)';inner.textContent=done?'\u2713':fmtTm(tm.left);hint.textContent=done?t(UI.reset):tm.iv?t(UI.pause):t(UI.start);}

function renderCook(){
  const r=R.find(x=>x.id===cookId);if(!r)return;const p=gp(r),c=gc(r.cat);
  let h=`<div style="--c:${c}">`;
  h+=`<div class="cook-hero"><div class="card-icon" style="--c:${c};width:42px;height:42px;border-radius:12px"><svg viewBox="0 0 24 24" style="width:22px;height:22px;stroke:${c};stroke-width:1.5;fill:none;stroke-linecap:round;stroke-linejoin:round">${iconInner(catIcon(r.cat))}</svg></div><div class="cook-title">${t(r.name)}</div>${r.sub?`<div class="cook-subtitle">${t(r.sub)}</div>`:''}<button id="shareBtn" class="share-btn" style="--c:${c}" onclick="event.stopPropagation();shareRecipe()">↗ ${t(UI.share)}</button></div>`;
  h+=`<div class="cook-portions"><label>${t(UI.portions)}</label><div class="stepper" style="--c:${c}"><button class="stepper-btn" onclick="event.stopPropagation();adjP('${r.id}',-1)">−</button><input class="stepper-val" type="number" min="1" max="12" value="${p}" onclick="event.stopPropagation();this.select()" onchange="event.stopPropagation();setP('${r.id}',+this.value)" onkeydown="if(event.key==='Enter'){this.blur()}"><button class="stepper-btn" onclick="event.stopPropagation();adjP('${r.id}',1)">+</button></div><span style="font-size:11px;opacity:.3;margin-left:4px">${UI.pWord(p)}</span></div>`;
  h+=`<div class="cook-ing"><div class="cook-ing-title">${t(UI.ingredients)} · ${p} ${UI.pWord(p)}</div><div class="cook-ing-list">${r.ing.map(i=>`<div class="ci">${t(i.t)} <span class="ci-a">${fmtIng(i,r.bp,p)}</span>${i.pp?` /${lang==='ru'?'порц':'serv'}`:''}</div>`).join('')}</div></div>`;
  h+=`<div class="cook-steps">`;
  r.steps.forEach((st,i)=>{const done=stepsDone[i],k='t'+i,tm=tmrs[k];h+=`<div class="cs${done?' done':''}"><div class="cs-top"><div class="cs-n${done?' dn':''}">${done?'✓':i+1}</div><div class="cs-t">${resolve(st.s,r.ing,r.bp,p)}`;if(st.tm){const left=tm?tm.left:st.tm,run=tm?.iv,fin=tm&&tm.left<=0;const pct=tm?((tm.total-tm.left)/tm.total)*100:0;h+=`<div class="timer-wrap" id="timer-${k}"><div class="timer-ring" onclick="event.stopPropagation();startTm(${i},${st.tm})" style="background:conic-gradient(${fin?'var(--vegan)':'var(--warm)'} ${pct}%, rgba(255,255,255,0.1) ${pct}%)"><div class="timer-inner" style="color:${fin?'var(--vegan)':'var(--text)'}">${fin?'\u2713':fmtTm(left)}</div></div><span class="timer-hint">${fin?t(UI.reset):run?t(UI.pause):t(UI.start)}</span></div>`;}h+=`</div><button class="check-btn${done?' checked':''}" onclick="toggleStep(${i},event)">${done?'✓':''}</button></div></div>`;});
  h+=`</div>`;
  if(r.tips?.length){h+=`<div class="cook-tips">${r.tips.map(tp=>`<div class="cook-tip" style="--c:${c}">${t(tp)}</div>`).join('')}</div>`;}
  h+=`<div class="cook-nutrition"><div class="cook-nutrition-row"><span>${r.kbju[0]} ${lang==='ru'?'ккал':'kcal'}</span>·<span>${lang==='ru'?'Б':'P'} ${r.kbju[1]}${lang==='ru'?'г':'g'}</span>·<span>${lang==='ru'?'Ж':'F'} ${r.kbju[2]}${lang==='ru'?'г':'g'}</span>·<span>${lang==='ru'?'У':'C'} ${r.kbju[3]}${lang==='ru'?'г':'g'}</span><span style="opacity:.5">/ ${t(UI.perPortion)}</span></div></div>`;
  h+=`</div>`;
  document.getElementById('cookContent').innerHTML=h;
}

function readURL(){const p=new URLSearchParams(location.search);if(p.get('lang')&&['ru','en'].includes(p.get('lang'))){lang=p.get('lang');localStorage.setItem('lang',lang);}if(p.get('clean')==='1'){hideNutrition=true;localStorage.setItem('hideNutrition','1');}document.documentElement.lang=lang;if(p.get('r')){const recipe=R.find(x=>x.id===p.get('r'));if(recipe)enterCook(recipe.id);}}
function updateURL(){const p=new URLSearchParams();if(cookId)p.set('r',cookId);if(lang!=='ru')p.set('lang',lang);const qs=p.toString();history.replaceState(null,'',qs?'?'+qs:location.pathname);}
function shareRecipe(){const p=new URLSearchParams();p.set('r',cookId);if(lang!=='ru')p.set('lang',lang);const url=location.origin+location.pathname+'?'+p;if(navigator.share){navigator.share({url}).catch(()=>{});}else if(navigator.clipboard){navigator.clipboard.writeText(url).then(()=>{const btn=document.getElementById('shareBtn');if(btn){const orig=btn.textContent;btn.textContent=t(UI.copied);setTimeout(()=>btn.textContent=orig,1500);}});}}

readURL();fullRender();
window.addEventListener('popstate',()=>{if(cookId)exitCook();});
</script>
</body>
</html>
