<html lang="ru">

<title>Рецепты / Recipes</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#121215;--card:#1a1a1f;--text:#e8e0d4;--dim:rgba(255,255,255,.4);--soup:#D4A373;--curry:#6B9080;--pasta:#9B72AA;--bowl:#5B8A9A;--comfort:#C4796B;--vegan:#6B9080;--gf:#D4A373;--fast:#5B8A9A;--hprot:#C4796B}
body{background:var(--bg);color:var(--text);font-family:'DM Sans','Helvetica Neue',sans-serif;min-height:100vh;overflow-x:hidden}
.mono{font-family:'JetBrains Mono',monospace}

/* Header */
.header{padding:24px 20px 12px;background:linear-gradient(180deg,rgba(212,163,115,0.06) 0%,transparent 100%)}
.header-top{display:flex;justify-content:space-between;align-items:flex-start}
.header-sub{font-size:11px;text-transform:uppercase;letter-spacing:2px;opacity:.35;font-weight:600;margin-bottom:4px}
.header h1{font-size:26px;font-weight:700;background:linear-gradient(135deg,#e8e0d4,#D4A373);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-desc{font-size:13px;opacity:.45;margin-top:4px}
.header-links{display:flex;gap:12px;margin-top:8px}
.header-link{font-size:12px;opacity:.35;text-decoration:none;color:var(--text)}
.header-link:hover{opacity:.6}

/* Lang toggle */
.lang-toggle{display:flex;border-radius:6px;overflow:hidden;border:1px solid rgba(255,255,255,.1);flex-shrink:0;margin-top:2px}
.lang-btn{padding:4px 10px;font-size:11px;font-weight:600;background:rgba(255,255,255,.03);color:rgba(255,255,255,.3);cursor:pointer;border:none;font-family:inherit;transition:all .12s}
.lang-btn.active{background:rgba(212,163,115,.1);color:#D4A373}
.lang-btn:first-child{border-right:1px solid rgba(255,255,255,.06)}

/* Filters */
.filters{padding:8px 16px 6px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.filters::-webkit-scrollbar{display:none}
.fbtn{flex-shrink:0;padding:6px 12px;border-radius:8px;border:1.5px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02);color:rgba(255,255,255,.35);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;font-family:inherit;white-space:nowrap}
.fbtn.active{border-color:var(--c);background:color-mix(in srgb,var(--c) 10%,transparent);color:var(--c)}
.tag-filters{padding:4px 16px 12px;display:flex;gap:6px;flex-wrap:wrap}
.tbtn{padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);color:rgba(255,255,255,.3);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
.tbtn.on{border-color:var(--c);color:var(--c);background:color-mix(in srgb,var(--c) 8%,transparent)}

/* Cards */
.cards{padding:0 16px 100px}
.card{border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1px solid color-mix(in srgb,var(--c) 25%,transparent);background:color-mix(in srgb,var(--c) 4%,#1a1a1f);cursor:pointer;transition:all .15s}
.card:active{transform:scale(0.99)}
.card-top{display:flex;gap:10px;align-items:center}
.card-emoji{font-size:24px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,.03);border-radius:8px;flex-shrink:0}
.card-body{flex:1;min-width:0}
.card-name{font-weight:700;font-size:14px;line-height:1.3}
.card-sub{font-size:11px;opacity:.4;font-style:italic;margin-top:1px}
.card-row{display:flex;gap:6px;margin-top:5px;flex-wrap:wrap;align-items:center}
.card-meta{font-size:11px;opacity:.4}
.card-tag{font-size:9px;font-weight:600;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.5px}
.tag-vegan{background:rgba(107,144,128,.12);color:var(--vegan)}
.tag-gf{background:rgba(212,163,115,.1);color:var(--gf)}
.tag-fast{background:rgba(91,138,154,.1);color:var(--fast)}
.tag-hprot{background:rgba(196,121,107,.1);color:var(--hprot)}
.card-kbju{display:flex;gap:4px;margin-top:5px}
.kp{font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(255,255,255,.04)}
.kp .mono{font-weight:600}
.kp-k .mono{color:var(--text)}.kp-p .mono{color:var(--vegan)}.kp-f .mono{color:var(--comfort)}.kp-c .mono{color:var(--pasta)}
.card-preview{margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.06)}
.card-preview-list{font-size:12px;line-height:1.7;opacity:.55;columns:2;column-gap:12px}
.card-cook{display:inline-flex;align-items:center;gap:4px;margin-top:8px;padding:7px 16px;border-radius:8px;border:1.5px solid color-mix(in srgb,var(--c) 30%,transparent);background:color-mix(in srgb,var(--c) 6%,transparent);color:var(--c);font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.card-cook:active{transform:scale(0.97)}

/* Cook view */
#browseView{display:block}#cookView{display:none}
body.cooking #browseView{display:none}body.cooking #cookView{display:block}
.cook-back{position:sticky;top:0;z-index:10;padding:12px 16px;background:linear-gradient(180deg,var(--bg) 80%,transparent);display:flex;align-items:center;gap:8px;cursor:pointer}
.cook-back-btn{font-size:13px;color:var(--dim);font-weight:600}
.cook-hero{padding:8px 20px 16px}
.cook-emoji{font-size:36px;margin-bottom:6px}
.cook-title{font-size:22px;font-weight:700;line-height:1.3}
.cook-subtitle{font-size:13px;opacity:.4;font-style:italic;margin-top:2px}
.cook-portions{display:flex;align-items:center;gap:10px;padding:0 20px 14px}
.cook-portions label{font-size:12px;opacity:.4}
.pbtns{display:flex;border-radius:8px;overflow:hidden;border:1px solid rgba(255,255,255,.1)}
.pbtn{padding:8px 16px;font-size:14px;font-weight:600;font-family:'JetBrains Mono',monospace;background:rgba(255,255,255,.03);color:rgba(255,255,255,.3);cursor:pointer;border:none;transition:all .12s}
.pbtn.active{background:color-mix(in srgb,var(--c) 12%,transparent);color:var(--c)}
.pbtn:not(:last-child){border-right:1px solid rgba(255,255,255,.06)}
.cook-kbju{display:flex;gap:6px;padding:0 20px 16px;flex-wrap:wrap}
.ckp{padding:5px 10px;border-radius:6px;background:rgba(255,255,255,.04);font-size:12px;display:flex;gap:4px;align-items:center}
.ckp .lab{font-size:10px;opacity:.4;text-transform:uppercase;letter-spacing:.3px}
.cook-ing{padding:0 20px 16px}
.cook-ing-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;opacity:.4;margin-bottom:8px}
.cook-ing-list{display:grid;grid-template-columns:1fr 1fr;gap:2px 12px}
.ci{font-size:13px;line-height:1.7;padding-left:14px;position:relative}
.ci::before{content:"·";position:absolute;left:2px;opacity:.3;font-weight:bold}
.ci-a{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:12px}
.cook-steps{padding:0 16px 20px}
.cs{border-radius:12px;padding:16px;margin-bottom:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
.cs.done{opacity:.5}
.cs-top{display:flex;gap:12px;align-items:flex-start}
.cs-n{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;background:color-mix(in srgb,var(--c) 10%,transparent);color:var(--c)}
.cs-n.dn{background:rgba(107,144,128,.15);color:var(--vegan)}
.cs-t{flex:1;font-size:15px;line-height:1.6}
.cs-t .hi{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:13px;padding:1px 5px;border-radius:4px;background:color-mix(in srgb,var(--c) 8%,transparent);color:var(--c)}
.cs-ck{width:28px;height:28px;border-radius:50%;border:2px solid rgba(255,255,255,.15);background:none;color:rgba(255,255,255,.2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;transition:all .15s}
.cs-ck.on{border-color:var(--vegan);background:var(--vegan);color:#1a1a1f}
.cs-tm{display:inline-flex;align-items:center;gap:6px;margin-top:8px;padding:4px 10px;border-radius:6px;background:rgba(255,255,255,.04);cursor:pointer;user-select:none}
.cs-tm:active{background:rgba(255,255,255,.08)}
.cs-td{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--c);min-width:36px}
.cs-tl{font-size:11px;opacity:.4}
.cs-tm.run .cs-td{color:#e8e0d4}.cs-tm.fin .cs-td{color:var(--vegan)}
.cook-tips{padding:0 16px 60px}
.cook-tip{font-size:13px;line-height:1.6;font-style:italic;opacity:.5;padding:10px 14px;border-left:2px solid var(--c);border-radius:0 8px 8px 0;background:rgba(255,255,255,.02);margin-bottom:6px}
.nothing{text-align:center;padding:60px 20px;opacity:.25;font-size:14px}
</style>
</head>

// ======================== STATE ========================
let curCat="all",activeTags=new Set(),openCard=null,cookId=null,cookPortion={},stepsDone={},tmrs={};

// ======================== HELPERS ========================
function sc(v,b,tgt){const s=v*(tgt/b);return s===Math.round(s)?Math.round(s):Math.round(s*10)/10;}
function fmtIng(ing,b,tgt){let a=ing.pp?ing.a:sc(ing.a,b,tgt);return t(ing.u)?`${a} ${t(ing.u)}`:`${a}`;}
function resolve(s,ings,b,tgt){
  return t(s).replace(/\{(\d+)\}/g,(_,i)=>{
    const ing=ings[+i];if(!ing)return'?';
    let a=ing.pp?ing.a:sc(ing.a,b,tgt);
    let short=t(ing.u)?`${a} ${t(ing.u)}`:`${a}`;
    return `<span class="hi">${short}</span>`;
  });
}
function gc(cat){return CATS.find(c=>c.id===cat)?.color||'#D4A373';}
function gp(r){return cookPortion[r.id]||r.bp;}
function pOpts(bp){return bp===1?[1,2,3]:bp===2?[1,2,3,4]:[2,3,4,6];}
function fmtTm(s){return`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}

// ======================== RENDER ========================
function fullRender(){
  document.getElementById('hTitle').textContent=t(UI.title);
  document.getElementById('hDesc').textContent=t(UI.desc);
  document.getElementById('hCoffee').textContent=t(UI.coffee);
  document.getElementById('cookBackLabel').textContent=t(UI.back);
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent.toLowerCase()===lang));
  renderBrowse();
  if(cookId)renderCook();
}

function renderBrowse(){
  document.getElementById('catBar').innerHTML=CATS.map(c=>
    `<button class="fbtn${curCat===c.id?' active':''}" style="--c:${c.color}" onclick="setCat('${c.id}')">${t(c.label)}</button>`
  ).join('');
  document.getElementById('tagBar').innerHTML=TAGS.map(tg=>
    `<button class="tbtn${activeTags.has(tg.id)?' on':''}" style="--c:${tg.color}" onclick="toggleTag('${tg.id}')">${t(tg.label)}</button>`
  ).join('');
  let items=curCat==='all'?R:R.filter(r=>r.cat===curCat);
  if(activeTags.size)items=items.filter(r=>[...activeTags].every(tg=>r.tags.includes(tg)));
  const list=document.getElementById('cardList');
  if(!items.length){list.innerHTML=`<div class="nothing">${t(UI.noMatch)}</div>`;return;}
  list.innerHTML=items.map(r=>{
    const c=gc(r.cat),isOpen=openCard===r.id;
    return `<div class="card${isOpen?' open':''}" style="--c:${c}" onclick="toggleCard('${r.id}')">
      <div class="card-top">
        <div class="card-emoji">${r.emoji}</div>
        <div class="card-body">
          <div class="card-name">${t(r.name)}</div>
          ${r.sub?`<div class="card-sub">${t(r.sub)}</div>`:''}
          <div class="card-row">
            <span class="card-meta">⏱ ${t(r.time)}</span>
            <span class="card-meta">🍽 ${r.bp} ${UI.pWord(r.bp)}</span>
            ${r.tags.map(tg=>`<span class="card-tag tag-${tg}">${tg==='vegan'?'🌱':tg==='gf'?'GF':tg==='fast'?'⏱':tg==='hprot'?'💪':tg}</span>`).join('')}
          </div>
          <div class="card-kbju">
            <span class="kp kp-k"><span class="mono">${r.kbju[0]}</span> ${lang==='ru'?'ккал':'kcal'}</span>
            <span class="kp kp-p">${lang==='ru'?'Б':'P'} <span class="mono">${r.kbju[1]}</span></span>
            <span class="kp kp-f">${lang==='ru'?'Ж':'F'} <span class="mono">${r.kbju[2]}</span></span>
            <span class="kp kp-c">${lang==='ru'?'У':'C'} <span class="mono">${r.kbju[3]}</span></span>
          </div>
        </div>
      </div>
      ${isOpen?`<div class="card-preview" onclick="event.stopPropagation()">
        <div class="card-preview-list">${r.ing.map(i=>`${t(i.t)}${t(i.u)?' · '+fmtIng(i,r.bp,r.bp):''}`).join('<br>')}</div>
        <button class="card-cook" style="--c:${c}" onclick="event.stopPropagation();enterCook('${r.id}')">${t(UI.cook)}</button>
      </div>`:''}
    </div>`;
  }).join('');
}

function setCat(id){curCat=id;openCard=null;renderBrowse();}
function toggleTag(id){activeTags.has(id)?activeTags.delete(id):activeTags.add(id);openCard=null;renderBrowse();}
function toggleCard(id){openCard=openCard===id?null:id;renderBrowse();}

// ======================== COOK ========================
function enterCook(id){
  cookId=id;stepsDone={};
  Object.keys(tmrs).forEach(k=>{if(tmrs[k].iv)clearInterval(tmrs[k].iv);});
  tmrs={};document.body.classList.add('cooking');window.scrollTo(0,0);renderCook();
}
function exitCook(){
  Object.keys(tmrs).forEach(k=>{if(tmrs[k].iv)clearInterval(tmrs[k].iv);});
  tmrs={};document.body.classList.remove('cooking');cookId=null;
}
function setCookP(id,n,e){e?.stopPropagation();cookPortion[id]=n;renderCook();}
function toggleStep(i,e){e?.stopPropagation();stepsDone[i]=!stepsDone[i];renderCook();}
function startTm(si,secs){
  const k='t'+si;
  if(tmrs[k]?.iv){clearInterval(tmrs[k].iv);tmrs[k].iv=null;renderCook();return;}
  if(!tmrs[k])tmrs[k]={left:secs,total:secs,iv:null};
  if(tmrs[k].left<=0){tmrs[k].left=secs;renderCook();return;}
  tmrs[k].iv=setInterval(()=>{tmrs[k].left--;if(tmrs[k].left<=0){clearInterval(tmrs[k].iv);tmrs[k].iv=null;}renderCook();},1000);
  renderCook();
}

function renderCook(){
  const r=R.find(x=>x.id===cookId);if(!r)return;
  const p=gp(r),c=gc(r.cat),opts=pOpts(r.bp);
  let h=`<div style="--c:${c}">`;
  h+=`<div class="cook-hero"><div class="cook-emoji">${r.emoji}</div><div class="cook-title">${t(r.name)}</div>${r.sub?`<div class="cook-subtitle">${t(r.sub)}</div>`:''}</div>`;
  h+=`<div class="cook-portions"><label>${t(UI.portions)}</label><div class="pbtns">${opts.map(n=>`<button class="pbtn${p===n?' active':''}" style="--c:${c}" onclick="setCookP('${r.id}',${n},event)">${n}</button>`).join('')}</div></div>`;
  h+=`<div class="cook-kbju">
    <div class="ckp"><span class="lab">${lang==='ru'?'ккал':'kcal'}</span><span class="mono" style="color:${c}">${r.kbju[0]}</span></div>
    <div class="ckp"><span class="lab">${lang==='ru'?'Б':'P'}</span><span class="mono" style="color:var(--vegan)">${r.kbju[1]}${lang==='ru'?' г':' g'}</span></div>
    <div class="ckp"><span class="lab">${lang==='ru'?'Ж':'F'}</span><span class="mono" style="color:var(--comfort)">${r.kbju[2]}${lang==='ru'?' г':' g'}</span></div>
    <div class="ckp"><span class="lab">${lang==='ru'?'У':'C'}</span><span class="mono" style="color:var(--pasta)">${r.kbju[3]}${lang==='ru'?' г':' g'}</span></div>
    <div class="ckp" style="opacity:.35"><span class="lab">${t(UI.perPortion)}</span></div>
  </div>`;
  h+=`<div class="cook-ing"><div class="cook-ing-title">${t(UI.ingredients)} · ${p} ${UI.pWord(p)}</div><div class="cook-ing-list">${r.ing.map(i=>`<div class="ci">${t(i.t)} <span class="ci-a">${fmtIng(i,r.bp,p)}</span>${i.pp?` /${lang==='ru'?'порц':'serv'}`:''}</div>`).join('')}</div></div>`;
  h+=`<div class="cook-steps">`;
  r.steps.forEach((st,i)=>{
    const done=stepsDone[i],k='t'+i,tm=tmrs[k];
    h+=`<div class="cs${done?' done':'"}"><div class="cs-top"><div class="cs-n${done?' dn':''}">${done?'✓':i+1}</div><div class="cs-t">${resolve(st.s,r.ing,r.bp,p)}`;
    if(st.tm){
      const left=tm?tm.left:st.tm,run=tm?.iv,fin=tm&&tm.left<=0;
      h+=`<div class="cs-tm${run?' run':''}${fin?' fin':''}" onclick="event.stopPropagation();startTm(${i},${st.tm})"><span class="cs-td">${fin?'✓':fmtTm(left)}</span><span class="cs-tl">${fin?t(UI.reset):run?t(UI.pause):t(UI.start)}</span></div>`;
    }
    h+=`</div><button class="cs-ck${done?' on':''}" onclick="toggleStep(${i},event)">${done?'✓':''}</button></div></div>`;
  });
  h+=`</div>`;
  if(r.tips?.length){h+=`<div class="cook-tips">${r.tips.map(tp=>`<div class="cook-tip" style="--c:${c}">${t(tp)}</div>`).join('')}</div>`;}
  h+=`</div>`;
  document.getElementById('cookContent').innerHTML=h;
}

// ======================== INIT ========================
fullRender();
window.addEventListener('popstate',()=>{if(cookId)exitCook();});
</script>
</body>
</html>
