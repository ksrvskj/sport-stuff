<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#121215">
<title>Tools</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#121215;color:#e8e0d4;font-family:'DM Sans','Helvetica Neue',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
h1{font-size:28px;font-weight:700;background:linear-gradient(135deg,#e8e0d4,#D4A373);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;text-align:center}
.sub{font-size:13px;opacity:.3;margin-bottom:36px;text-align:center}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:400px}
a.card{text-decoration:none;border-radius:14px;padding:20px 16px;border:1px solid;display:flex;flex-direction:column;align-items:center;text-align:center;transition:all .15s;cursor:pointer}
a.card:active{transform:scale(0.97)}
.card-emoji{font-size:32px;margin-bottom:8px}
.card-name{font-weight:700;font-size:14px;color:#e8e0d4;margin-bottom:2px}
.card-desc{font-size:11px;opacity:.4;line-height:1.4}
.c1{background:rgba(212,163,115,.05);border-color:rgba(212,163,115,.2)}
.c1 .card-name{color:#D4A373}
.c2{background:rgba(107,144,128,.05);border-color:rgba(107,144,128,.2)}
.c2 .card-name{color:#6B9080}
.c3{background:rgba(139,90,43,.05);border-color:rgba(139,90,43,.2)}
.c3 .card-name{color:#8B5A2B}
.c4{background:rgba(155,114,170,.05);border-color:rgba(155,114,170,.2)}
.c4 .card-name{color:#9B72AA}
.footer{margin-top:40px;font-size:11px;opacity:.15;text-align:center}
</style>
</head>
<body>
<h1>Tools</h1>
<div class="sub">Personal dashboard</div>
<div class="grid">
  <a class="card c1" href="workout.html">
    <div class="card-emoji">🏋️</div>
    <div class="card-name">Workout</div>
    <div class="card-desc">Morning routine · 3 tiers</div>
  </a>
  <a class="card c2" href="recipes.html">
    <div class="card-emoji">🍲</div>
    <div class="card-name">Recipes</div>
    <div class="card-desc">Batch cooking · КБЖУ</div>
  </a>
  <a class="card c3" href="coffee.html">
    <div class="card-emoji">☕</div>
    <div class="card-name">Coffee</div>
    <div class="card-desc">Chemex · V60 · Aeropress</div>
  </a>
  <a class="card c4" href="#">
    <div class="card-emoji">🔮</div>
    <div class="card-name">Soon</div>
    <div class="card-desc">More tools coming</div>
  </a>
</div>
<div class="footer">ksrvskj.github.io</div>
</body>
</html>
