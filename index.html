<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f12">
<title>Tools</title>
<link rel="stylesheet" href="style.css">
<style>
/* Hub-specific layout */
body{
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:40px 24px;
  overflow:hidden;
}

/* Ambient glows */
.glow{position:fixed;width:280px;height:280px;border-radius:50%;filter:blur(100px);opacity:.05;pointer-events:none;z-index:0}
.glow-warm{background:var(--warm);top:-100px;right:-80px}
.glow-cool{background:var(--cool);bottom:-120px;left:-100px}

.content{position:relative;z-index:2;width:100%;max-width:400px}

/* Header */
.hub-header{text-align:center;margin-bottom:40px}
.hub-title{font-size:13px;font-weight:400;letter-spacing:5px;text-transform:uppercase;color:var(--dim)}

/* Bento */
.bento{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* Card base */
a.bc{
  text-decoration:none;
  border-radius:16px;
  padding:20px;
  display:flex;
  align-items:center;
  gap:12px;
  background:var(--surface);
  border:1px solid color-mix(in srgb, var(--ac) 14%, transparent);
  transition:all .2s ease;
  position:relative;
  overflow:hidden;
}
a.bc:active{transform:scale(0.97)}

/* Subtle inner glow */
a.bc::after{
  content:'';position:absolute;
  width:140px;height:140px;border-radius:50%;
  background:var(--ac);opacity:.04;
  filter:blur(60px);pointer-events:none;
  top:-40px;left:-40px;
}

/* Hero (full width) */
.bc-hero{grid-column:1/-1;padding:24px;gap:14px}
.bc-hero .bc-icon{width:44px;height:44px;border-radius:12px}
.bc-hero .bc-icon svg{width:22px;height:22px}
.bc-hero .bc-name{font-size:16px}

/* Regular cards */
.bc-reg{padding:18px 16px;gap:10px}
.bc-reg .bc-icon{width:34px;height:34px;border-radius:9px}
.bc-reg .bc-icon svg{width:17px;height:17px}

/* Icon container */
.bc-icon{
  border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  background:color-mix(in srgb, var(--ac) 8%, transparent);
  flex-shrink:0;
}
.bc-icon svg{
  stroke:var(--ac);stroke-width:1.6;fill:none;
  stroke-linecap:round;stroke-linejoin:round;
}

/* Text */
.bc-text{flex:1;min-width:0}
.bc-name{font-size:14px;font-weight:500;color:var(--text);letter-spacing:.1px}
.bc-desc{font-size:11px;color:var(--dim);font-weight:300;margin-top:3px;line-height:1.35}

/* Themes */
.t-cool{--ac:var(--cool)}
.t-warm{--ac:var(--warm)}
.t-neutral{--ac:var(--neutral)}

/* Entrance animation */
.hub-header,.bc,.hub-footer{
  animation:fadeUp .4s ease both;
}
.hub-header{animation-delay:0s}
.bento .bc:nth-child(1){animation-delay:.05s}
.bento .bc:nth-child(2){animation-delay:.1s}
.bento .bc:nth-child(3){animation-delay:.15s}
.hub-footer{animation-delay:.2s}

/* Footer */
.hub-footer{text-align:center;margin-top:36px;font-size:10px;color:var(--dim);opacity:.2;letter-spacing:1.5px;font-weight:300}
</style>
</head>
<body>

<div class="glow glow-warm"></div>
<div class="glow glow-cool"></div>

<div class="content">
  <div class="hub-header">
    <div class="hub-title">tools</div>
  </div>

  <div class="bento">

    <!-- Hero: Workout -->
    <a class="bc bc-hero t-cool" href="workout.html">
      <div class="bc-icon">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="4" r="1.5"/>
          <path d="M8 10l4 3 4-3"/>
          <path d="M12 13v5"/>
          <path d="M9 22l3-4 3 4"/>
        </svg>
      </div>
      <div class="bc-text">
        <div class="bc-name">Workout</div>
        <div class="bc-desc">Morning routine · 3 tiers · 10-38 min</div>
      </div>
    </a>

    <!-- Recipes -->
    <a class="bc bc-reg t-warm" href="recipes.html">
      <div class="bc-icon">
        <svg viewBox="0 0 24 24">
          <path d="M5 10h14v8a3 3 0 01-3 3H8a3 3 0 01-3-3v-8z"/>
          <path d="M3 10h18"/>
          <path d="M8 5c0 1.5 1 2.5 1 4"/>
          <path d="M12 4c0 1.5 1 2.5 1 4"/>
          <path d="M16 5c0 1.5 1 2.5 1 4"/>
        </svg>
      </div>
      <div class="bc-text">
        <div class="bc-name">Recipes</div>
        <div class="bc-desc">15 recipes · RU/EN</div>
      </div>
    </a>

    <!-- Coffee -->
    <a class="bc bc-reg t-neutral" href="coffee.html">
      <div class="bc-icon">
        <svg viewBox="0 0 24 24">
          <path d="M17 8h1a3 3 0 010 6h-1"/>
          <path d="M3 8h14v9a3 3 0 01-3 3H6a3 3 0 01-3-3V8z"/>
          <path d="M6 2v3"/>
          <path d="M10 2v3"/>
          <path d="M14 2v3"/>
        </svg>
      </div>
      <div class="bc-text">
        <div class="bc-name">Coffee</div>
        <div class="bc-desc">Chemex · V60 · Aeropress</div>
      </div>
    </a>

  </div>

  <div class="hub-footer">ksrvskj.github.io</div>
</div>

</body>
</html>
